name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ver
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-ncs
      - name: Build mouse release
        run: |
          west build -p auto -b hitscan/nrf52840 applications/gaming_mouse \
              --sysbuild --build-dir build/mouse \
              -- -DCONF_FILE=prj_esb_release.conf \
                 -DBOARD_ROOT=${{ github.workspace }}/applications/gaming_mouse \
                 -DZEPHYR_EXTRA_MODULES=${{ github.workspace }}/modules/paw3395

      - name: Build dongle-ls release
        run: |
          west build -p auto -b hitscan52820/nrf52820 applications/gaming_mouse \
              --sysbuild --build-dir build/dongle-ls \
              -- -DCONF_FILE=prj_release.conf \
                 -DBOARD_ROOT=${{ github.workspace }}/applications/gaming_mouse \
                 -DZEPHYR_EXTRA_MODULES=${{ github.workspace }}/modules/paw3395

      - uses: ./.github/actions/setup-ch32
        with:
          build-args: release

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp build/mouse/gaming_mouse/zephyr/zephyr.hex artifacts/mouse-fw.hex
          cp build/mouse/gaming_mouse/zephyr/zephyr.signed.bin artifacts/mouse-fw-update.bin
          cp build/dongle-ls/gaming_mouse/zephyr/zephyr.hex artifacts/dongle-ls-fw.hex
          cp build/dongle-ls/gaming_mouse/zephyr/zephyr.signed.bin artifacts/dongle-ls-fw-update.bin
          cp dongle-hs-ch32v305/build/dongle-hs.bin artifacts/dongle-hs-fw.bin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e tools/reqtool

      - name: Read protocol version
        id: proto
        run: |
          PROTO=$(grep -oP 'OCOR_PROTOCOL_VERSION\s+\K\d+' shared/include/protocol_version.h)
          echo "version=$PROTO" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        run: |
          python tools/manifest.py \
              --release "${{ steps.ver.outputs.version }}" \
              --git-sha "${{ github.sha }}" \
              --protocol-version "${{ steps.proto.outputs.version }}" \
              --artifacts-dir artifacts \
              --output artifacts/manifest.json

      - name: Traceability report
        run: |
          reqtool report --tag "${{ steps.ver.outputs.version }}" \
                        --output artifacts/traceability-matrix.md

      - name: Install git-cliff
        # Installing the binary directly is more robust than the orhun/git-cliff-action
        # wrapper, whose Docker image at the time of writing depends on Debian Buster
        # (now archived; apt-get update returns 404).
        run: |
          VER=2.6.1
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${VER}/git-cliff-${VER}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin --wildcards "*/git-cliff"
          git-cliff --version

      - name: Generate CHANGELOG.md
        run: |
          git-cliff --config cliff.toml --latest --strip header --output artifacts/CHANGELOG.md
          cat artifacts/CHANGELOG.md

      - name: Bundle zip
        run: |
          cd artifacts
          zip -r "../ocor-mouse-${{ steps.ver.outputs.version }}.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            artifacts/
            ocor-mouse-*.zip

  # Publishes web-config/dist/ to the public companion repo `ocor-mouse-config`'s
  # `gh-pages` branch. That repo serves GitHub Pages at
  # https://hitscangaming.github.io/ocor-mouse-config/.
  # Auth: CONFIG_DEPLOY_KEY secret (ed25519 private key) — paired with a write-
  # access deploy key installed on ocor-mouse-config.
  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: web-config
      - run: npm run build
        working-directory: web-config
      - name: Publish to ocor-mouse-config
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.CONFIG_DEPLOY_KEY }}
          external_repository: hitscanGaming/ocor-mouse-config
          publish_branch: gh-pages
          publish_dir: web-config/dist
          commit_message: "release ${{ needs.build.outputs.version }}"

  publish-draft:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: release-bundle/

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          gh release create "$VERSION" \
            --draft \
            --title "$VERSION" \
            --notes-file release-bundle/artifacts/CHANGELOG.md \
            release-bundle/ocor-mouse-*.zip \
            release-bundle/artifacts/mouse-fw.hex \
            release-bundle/artifacts/mouse-fw-update.bin \
            release-bundle/artifacts/dongle-ls-fw.hex \
            release-bundle/artifacts/dongle-ls-fw-update.bin \
            release-bundle/artifacts/dongle-hs-fw.bin \
            release-bundle/artifacts/manifest.json \
            release-bundle/artifacts/traceability-matrix.md

  # Opens the per-release QA tracking issue. The `release-qa` label must be
  # bootstrapped once in the repo before the first run; see README/Phase 7.
  #   gh label create release-qa --color FFD700 \
  #       --description "Release QA tracking issue"
  qa-issue:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e tools/reqtool

      - name: Generate checklist
        run: |
          reqtool checklist \
              --tag "${{ needs.build.outputs.version }}" \
              --products hitscan \
              --output /tmp/checklist.md

      - name: Open release QA issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          gh issue create \
              --title "Release QA: $VERSION" \
              --body-file /tmp/checklist.md \
              --label "release-qa"

  summary:
    needs: [build, publish-draft, deploy-pages, qa-issue]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Release ${{ needs.build.outputs.version }} built, draft published, web deployed, QA issue opened."
          echo "Next: QA closes the issue with all boxes ticked → promote-release.yml flips draft to published."
