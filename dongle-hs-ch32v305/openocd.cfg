# OpenOCD config for WCH-Link debugger on CH32V305.
# Requires the WCH OpenOCD fork (https://github.com/openwch/openocd_wch).
# Use as: openocd -f openocd.cfg -c "program build/dongle-hs.hex verify reset exit"
adapter driver wlink
adapter speed 6000
transport select sdi
set _CHIPNAME ch32v305
target create $_CHIPNAME.cpu riscv -coreid 0 -endian little -chain-position auto0.tap
