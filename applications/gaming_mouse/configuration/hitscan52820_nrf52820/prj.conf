################################################################################
# Application Configuration

# CONFIG_CAF_CLICK_DETECTOR=y
CONFIG_CAF_LEDS=y
CONFIG_LED=y
CONFIG_CAF_LEDS_GPIO=y
CONFIG_LED_GPIO=y
CONFIG_GPIO=y

CONFIG_DESKTOP_HWID=y
CONFIG_HWINFO=y

CONFIG_DESKTOP_POWER_MANAGER=n

# rsource "src/modules/Kconfig.watchdog"
CONFIG_DESKTOP_WATCHDOG_ENABLE=y
# rsource "src/modules/Kconfig.failsafe"
# CONFIG_DESKTOP_FAILSAFE_ENABLE=y

# CONFIG_DESKTOP_CONFIG_CHANNEL_ENABLE=y
CONFIG_ESB=y
CONFIG_DESKTOP_ESB_RX_ENABLE=y
CONFIG_DESKTOP_ESB_TX_ENABLE=n
CONFIG_DESKTOP_BT=n

CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_SPI_NRFX_RAM_BUFFER_SIZE=8
CONFIG_DESKTOP_SPI_MASTER=y
CONFIG_DESKTOP_SPI_INTERRUPT_PIN=1
CONFIG_POLL=y

################################################################################
# Zephyr Configuration
# Enable 32MHz clock 
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC_CALIBRATION=y
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
# CONFIG_ISR_STACK_SIZE=1280
CONFIG_ISR_STACK_SIZE=1024
CONFIG_MAIN_STACK_SIZE=720

# zephyr/blob/main/drivers/usb/device/Kconfig
# CONFIG_USB_NRFX_WORK_QUEUE_STACK_SIZE=720
# Reuse system workqueue as Bluetooth RX context to reduce memory consumption
# CONFIG_BT_RECV_WORKQ_SYS=y
# Disable Bluetooth long workqueue to reduce memory consumption
# CONFIG_BT_LONG_WQ=n
# Limit number of key slots in the PSA Crypto core to reduce memory consumption
CONFIG_MBEDTLS_PSA_KEY_SLOT_COUNT=10

CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n

CONFIG_NUM_COOP_PRIORITIES=10
CONFIG_NUM_PREEMPT_PRIORITIES=11
CONFIG_TIMESLICING=n

CONFIG_HEAP_MEM_POOL_SIZE=1024

# CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_SYSTEM_CLOCK_NO_WAIT=y

CONFIG_HW_STACK_PROTECTION=n
CONFIG_RESET_ON_FATAL_ERROR=n

CONFIG_REBOOT=y

CONFIG_SIZE_OPTIMIZATIONS=y


CONFIG_ENTROPY_CC3XX=n

# Disable Bluetooth features not needed
CONFIG_BT_PHY_UPDATE=n

# Disable Bluetooth controller features not needed
CONFIG_BT_CTLR_PRIVACY=n
CONFIG_BT_CTLR_PHY_2M=n

# debug specific configurations
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
# CONFIG_CAF_BUTTONS=y
# CONFIG_CAF_BUTTONS_POLARITY_INVERSED=y
# CONFIG_CAF_BUTTONS_PM_KEEP_ALIVE=n
CONFIG_DESKTOP_INIT_LOG_HID_REPORT_EVENT=n



CONFIG_DESKTOP_HWID=y
CONFIG_HWINFO=y
CONFIG_COUNTER=y
CONFIG_POLLING_RATE_ENABLE=y
