manifest:
  version: "1.0"
  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect
  projects:
    - name: sdk-nrf
      remote: ncs
      revision: v3.0.2
      path: nrf
      import:
        # pull nrf's manifest deps (zephyr, mcuboot, nrfxlib, etc.) for reproducible builds
        name-allowlist:
          - zephyr
          - nrfxlib
          - mcuboot
          - cmsis
          - hal_nordic
          - segger
          - tinycrypt
          - mbedtls
          - psa-arch-tests
          - tf-m-tests
          - trusted-firmware-m
